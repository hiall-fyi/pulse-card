name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:pulse-card
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: |
            dist/pulse-card.js
            dist/pulse-card-editor.js
            dist/pulse-climate-editor.js
